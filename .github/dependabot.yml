version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    groups:
      codeql:
        patterns:
          - "github/codeql-action/*"

  - package-ecosystem: docker
    directory: /.github/workflows/wheels/docker
    schedule:
      interval: weekly

  - package-ecosystem: pip
    directory: /doc
    schedule:
      interval: weekly
